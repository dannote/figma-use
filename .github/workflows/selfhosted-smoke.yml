    runs-on: [self-hosted, macOS]
    env:
      RUN_FIGMA_SMOKE: '1'
      FIGMA_MCP_URL: http://localhost:38451/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
